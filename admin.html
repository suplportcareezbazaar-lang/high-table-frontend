<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #111;
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #222;
        }

        .sidebar h2 {
            text-align: center;
            color: #00e5ff;
        }

        .menu button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
        }

        .menu button.active {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        h3 {
            margin-top: 0;
            color: #00e5ff;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #222;
            text-align: center;
        }

        th {
            background: #0f0f0f;
        }

        tr:hover {
            background: #1a1a1a;
        }

        /* BUTTONS */
        button {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .approve {
            background: #00c853;
            color: #000;
        }

        .reject {
            background: #ff5252;
            color: #fff;
        }

        .ban {
            background: #ff1744;
            color: #fff;
        }

        .start {
            background: #00c853;
            color: #000;
        }

        .stop {
            background: #ff5252;
            color: #fff;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        select {
            padding: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚙️ Admin</h2>

        <div class="menu">
            <button class="tab active" data-tab="users">Users</button>
            <button class="tab" data-tab="banks">Bank</button>
            <button class="tab" data-tab="bets">Bets</button>
            <button class="tab" data-tab="deposits">Deposits</button>
            <button class="tab" data-tab="withdraw">Withdrawals</button>
            <button class="tab" data-tab="sports">Sports</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- USERS -->
        <div id="users" class="section active">
            <h3>Users</h3>

            <input type="text" id="userSearch" placeholder="Search user..." />

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Role</th>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>

            <div id="userPagination"></div>
        </div>

        <!-- BANK -->
        <div id="banks" class="section">
            <h3>Bank Details</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>ID</th>
                        <th>Bank</th>
                        <th>Account</th>
                    </tr>
                </thead>
                <tbody id="bankTable"></tbody>
            </table>
        </div>

        <!-- BETS -->
        <div id="bets" class="section">
            <h3>Bets</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>ID</th>
                        <th>Match</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="betTable"></tbody>
            </table>
        </div>

        <!-- DEPOSITS -->
        <div id="deposits" class="section">
            <h3>Deposits</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>ID</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="depositTable"></tbody>
            </table>
        </div>

        <!-- WITHDRAW -->
        <div id="withdraw" class="section">
            <h3>Withdrawals</h3>

            <select id="withdrawFilter">
                <option value="">All</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
            </select>

            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Bank</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdrawTable"></tbody>
            </table>
        </div>

        <!-- SPORTS -->
        <div id="sports" class="section">
            <h3>Sports Control</h3>
            <div id="sportsControls"></div>
        </div>

    </div>

    <script>
        document.querySelectorAll(".tab").forEach(btn => {
            btn.onclick = () => {

                document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
                document.getElementById(btn.dataset.tab).classList.add("active");
            };
        });
    </script>

    <script src="admin.js"></script>

</body>

</html>
